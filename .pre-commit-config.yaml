repos:
  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest (quick)
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && .venv/bin/pytest -q --tb=no 2>/dev/null || pytest -q --tb=no'
        language: system
        pass_filenames: false
        always_run: true
      - id: no-env-commit
        name: block .env commits
        entry: bash -c 'git diff --cached --name-only | grep -E "^\\.env$|\\.env\\.local$" && exit 1 || exit 0'
        language: system
        pass_filenames: false
        always_run: true
