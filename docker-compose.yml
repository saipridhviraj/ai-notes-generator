version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ai-notes-generator:local
    container_name: ai-notes-generator
    ports:
      - "8000:8000"
    volumes:
      - notes_data:/app/generated_notes
      - app_data:/app/data
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  notes_data:
    driver: local
  app_data:
    driver: local
